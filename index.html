<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellcastle Count Up - Enhanced</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #eee; text-align: center; }
        h1 { color: #ff9800; }
        .setup, .game { margin: 20px auto; max-width: 900px; }
        input[type="text"], input[type="number"], select { padding: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff; margin: 5px; }
        button { padding: 10px 20px; background: #ff9800; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: #000; margin: 5px; }
        button:hover { background: #e68a00; }
        button.undo-btn { background: #d32f2f; color: white; }
        button.undo-btn:hover { background: #b71c1c; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; }
        th { background: #333; }
        .points-per-round { font-weight: bold; color: #ff9800; }
        .total-row { background: #2a2a2a; font-weight: bold; }
        
        /* Quick Draw Segment Buttons */
        .quick-draw-controls { display: none; margin: 20px auto; max-width: 800px; }
        .qd-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 10px; }
        .qd-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px; cursor: pointer; }
        .qd-btn:hover { background: #444; }
        .qd-btn.bull { background: #d32f2f; grid-column: span 10; }
        
        .history-log { font-size: 0.9em; color: #aaa; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <h1>Hellcastle Count Up</h1>

    <div id="setup-screen" class="setup">
        <input type="text" id="player-name" placeholder="Enter Player Name">
        <button onclick="addPlayer()">Add Player</button>
        <div id="player-list" style="margin: 10px;"></div>
        
        <div style="margin: 20px;">
            <label for="mode-select">Game Mode:</label>
            <select id="mode-select">
                <option value="8">Count Up (8 Rounds)</option>
                <option value="15">Count Up 15 (15 Rounds)</option>
                <option value="3">Quick Draw (3 Rounds)</option>
            </select>
        </div>

        <button onclick="startGame()" id="start-btn" style="display:none;">Start Game</button>
    </div>

    <div id="game-screen" class="game" style="display:none;">
        <!-- Quick Draw Input Panel (Visible only in Quick Draw mode) -->
        <div id="qd-panel" class="quick-draw-controls">
            <h3>Quick Draw Input (Click to add to current round)</h3>
            <div class="qd-grid" id="qd-grid">
                <!-- Generated by JS -->
            </div>
            <div style="margin-top:10px;">
                <button onclick="clearQDInput()" style="background:#555;">Clear Quick Entry</button>
                <span id="qd-current-entry" style="margin-left:10px; font-weight:bold; color:#ff9800;">0</span>
            </div>
        </div>

        <table id="scoreboard">
            <thead>
                <tr id="header-row">
                    <th>Round</th>
                </tr>
            </thead>
            <tbody id="score-body">
                <!-- Rounds injected here -->
            </tbody>
            <tfoot>
                <tr id="total-row" class="total-row"><td>Total</td></tr>
                <tr id="ppr-row" class="points-per-round"><td>Points per round</td></tr>
            </tfoot>
        </table>
        
        <br>
        <button class="undo-btn" onclick="undoLastEntry()">Undo Last Entry</button>
        <button onclick="location.reload()">New Game</button>
        <div id="history-log" class="history-log"></div>
    </div>

    <script>
        let players = [];
        let totalRounds = 8;
        let currentMode = "Count Up";
        let inputHistory = []; // Stores {playerIndex, roundIndex, value} for undo

        // Quick Draw State
        let qdCurrentEntry = 0;

        function addPlayer() {
            const nameInput = document.getElementById('player-name');
            const name = nameInput.value.trim();
            if (name && !players.includes(name)) {
                players.push(name);
                const list = document.getElementById('player-list');
                const p = document.createElement('span');
                p.textContent = name + " ";
                p.style.margin = "0 10px";
                list.appendChild(p);
                nameInput.value = '';
                document.getElementById('start-btn').style.display = 'inline-block';
            }
        }

        function startGame() {
            const modeSelect = document.getElementById('mode-select');
            totalRounds = parseInt(modeSelect.value);
            currentMode = modeSelect.options[modeSelect.selectedIndex].text;

            // Check if Quick Draw mode
            const isQuickDraw = totalRounds === 3;
            document.getElementById('qd-panel').style.display = isQuickDraw ? 'block' : 'none';
            
            if (isQuickDraw) {
                generateQuickDrawGrid();
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            const headerRow = document.getElementById('header-row');
            const scoreBody = document.getElementById('score-body');
            const totalRow = document.getElementById('total-row');
            const pprRow = document.getElementById('ppr-row');

            // Reset headers/footers
            headerRow.innerHTML = '<th>Round</th>';
            totalRow.innerHTML = '<td>Total</td>';
            pprRow.innerHTML = '<td>Points per round</td>';

            players.forEach((player, pIdx) => {
                let th = document.createElement('th');
                th.textContent = player;
                headerRow.appendChild(th);

                let totalTd = document.createElement('td');
                totalTd.id = `total-${pIdx}`;
                totalTd.textContent = '0';
                totalRow.appendChild(totalTd);

                let pprTd = document.createElement('td');
                pprTd.id = `ppr-${pIdx}`;
                pprTd.textContent = '0';
                pprRow.appendChild(pprTd);
            });

            for (let r = 1; r <= totalRounds; r++) {
                let tr = document.createElement('tr');
                let tdRound = document.createElement('td');
                tdRound.textContent = r;
                tr.appendChild(tdRound);

                players.forEach((_, pIdx) => {
                    let td = document.createElement('td');
                    let input = document.createElement('input');
                    input.type = 'number';
                    input.style.width = '60px';
                    input.id = `input-${pIdx}-${r}`; // Unique ID for tracking
                    input.oninput = () => {
                        // Save state for undo before changing
                        if (input.value !== "") {
                            inputHistory.push({
                                pIdx: pIdx,
                                rIdx: r,
                                val: input.value,
                                element: input
                            });
                        }
                        calculateScores();
                    };
                    input.className = `p-score-${pIdx}`;
                    td.appendChild(input);
                    tr.appendChild(td);
                });
                scoreBody.appendChild(tr);
            }
        }

        function calculateScores() {
            players.forEach((_, pIdx) => {
                const inputs = document.querySelectorAll(`.p-score-${pIdx}`);
                let total = 0;
                let roundsPlayed = 0;

                inputs.forEach(input => {
                    let val = parseFloat(input.value);
                    if (!isNaN(val)) {
                        total += val;
                        roundsPlayed++;
                    }
                });

                document.getElementById(`total-${pIdx}`).textContent = total;
                let ppr = roundsPlayed > 0 ? (total / roundsPlayed).toFixed(2) : 0;
                document.getElementById(`ppr-${pIdx}`).textContent = ppr;
            });
        }

        // --- Undo Functionality ---
        function undoLastEntry() {
            if (inputHistory.length === 0) {
                document.getElementById('history-log').textContent = "Nothing to undo.";
                return;
            }

            const lastAction = inputHistory.pop();
            const inputEl = lastAction.element;
            
            // Clear the value
            inputEl.value = '';
            
            // Recalculate
            calculateScores();
            
            document.getElementById('history-log').textContent = `Undid entry for ${players[lastAction.pIdx]} Round ${lastAction.rIdx}`;
        }

        // --- Quick Draw Logic ---
        function generateQuickDrawGrid() {
            const grid = document.getElementById('qd-grid');
            grid.innerHTML = '';
            
            // Numbers 1-20
            for (let i = 1; i <= 20; i++) {
                const btn = document.createElement('button');
                btn.className = 'qd-btn';
                btn.textContent = i;
                btn.onclick = () => addToQuickEntry(i);
                grid.appendChild(btn);
            }
            
            // Bullseye (50)
            const bullBtn = document.createElement('button');
            bullBtn.className = 'qd-btn bull';
            bullBtn.textContent = "BULL (50)";
            bullBtn.onclick = () => addToQuickEntry(50);
            grid.appendChild(bullBtn);
        }

        function addToQuickEntry(value) {
            qdCurrentEntry += value;
            document.getElementById('qd-current-entry').textContent = qdCurrentEntry;
        }

        function clearQDInput() {
            qdCurrentEntry = 0;
            document.getElementById('qd-current-entry').textContent = '0';
        }

        // Override the standard input behavior for Quick Draw to inject the sum
        // This runs after the grid is generated
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.addedNodes.length) {
                    // Re-attach input listeners to handle QD injection if needed
                    // For simplicity in this version, we will assume the user 
                    // manually types the result of the QD grid into the box, 
                    // OR we can auto-fill the last active input.
                    
                    const inputs = document.querySelectorAll('#score-body input');
                    inputs.forEach(inp => {
                        // Add a specific listener for the QD button action
                        // We'll attach a custom event or just use a global function to fill the "active" input
                    });
                }
            });
        });
        
        // Add a helper to fill the last focused input with QD score
        // We'll attach this to the QD buttons dynamically
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('qd-btn')) {
                // Find the last focused input in the table
                const activeInput = document.activeElement;
                if (activeInput && activeInput.tagName === 'INPUT' && activeInput.type === 'number') {
                    qdCurrentEntry = parseInt(document.getElementById('qd-current-entry').textContent);
                    activeInput.value = qdCurrentEntry;
                    
                    // Trigger the input event to calculate scores and save history
                    activeInput.dispatchEvent(new Event('input'));
                    
                    // Reset QD
                    clearQDInput();
                } else {
                    alert("Please click a score box in the table first, then click the numbers.");
                }
            }
        });

    </script>
</body>
</html>
